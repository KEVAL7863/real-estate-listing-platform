{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body p-5">
                    <i class="bi bi-exclamation-octagon fs-1 text-danger"></i>
                    <h4 class="fw-bold mt-3">Delete this property?</h4>
                    <p class="text-muted">"{{ property.title }}" will be permanently removed. This cannot be undone.</p>
                    <form method="post" class="d-flex gap-2 justify-content-center">
                        {% csrf_token %}
                        <button class="btn btn-danger px-4">Yes, Delete</button>
                        <a href="{% url 'accounts:dashboard' %}" class="btn btn-light">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
